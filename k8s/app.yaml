apiVersion: v1
kind: Namespace
metadata:
  name: ledger-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-api-config
  namespace: ledger-api
data:
  APP_NAME: "ledger-api"
  PORT: "8000"
  REDIS_URL: "redis://:redis123@redis:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: ledger-api-secret
  namespace: ledger-api
type: Opaque
stringData:
  DATABASE_URL: "postgresql://ledger_rw:ledger_password123@postgres:5432/mamo_db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: ledger-api
  labels:
    app: ledger-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ledger-api
  template:
    metadata:
      labels:
        app: ledger-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: ledger-api
          image: venndev209999/ledger-api:dev1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: APP_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: ledger-api-config
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ledger-api-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-api
  namespace: ledger-api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: ledger-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ledger-api-pdb
  namespace: ledger-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ledger-api
