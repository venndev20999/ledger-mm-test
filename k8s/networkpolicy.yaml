apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ledger-api-netpol
  namespace: ledger-api
spec:
  podSelector:
    matchLabels:
      app: ledger-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to PostgreSQL external IP
    - to:
        - ipBlock:
            cidr: 192.168.122.245/32
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to Redis external IP
    - to:
        - ipBlock:
            cidr: 192.168.122.203/32
      ports:
        - protocol: TCP
          port: 6379
