name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          ignore: DL3008,DL3013 # DL3008: Pin apt packages. DL3013: Pin pip packages. (Handled via requirements.txt)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask redis psycopg2-binary
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Run Unit Tests
        run: |
          cd app && python -m pytest -v

      - name: Build Application Image
        run: |
          docker build -t venndev209999/ledger-api:dev1 -f app/Dockerfile .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          # for test, it should be 'ledger-api:${{ github.sha }}' for scanning and gitops deployment
          image-ref: 'venndev209999/ledger-api:dev1'
          format: 'table'
          # ignore the failed scan, because the image is built locally with local docker daemon
          exit-code: '0' # set to '1' for production
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform
        run: |
          cd terraform
          terraform fmt -check
          terraform init -backend=false
          terraform validate

      - name: Spin up docker-compose local stack
        run: |
          docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          TIMEOUT=60
          INTERVAL=2
          ELAPSED=0
          until [ $(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/readyz) -eq 200 ] || [ $ELAPSED -ge $TIMEOUT ]; do
            echo "Waiting for readyz to return 200... (elapsed: ${ELAPSED}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Timeout: Services failed to become ready!"
            docker compose logs
            exit 1
          fi
          echo "Services are ready!"

      - name: Verify application endpoint
        run: |
          # Query "/" and verify request_count increments
          RESPONSE=$(curl -s http://localhost:8000/)
          echo "App Response: $RESPONSE"
          if [[ "$RESPONSE" != *'"app":"ledger-api"'* ]]; then
            echo "Endpoint verification failed!"
            exit 1
          fi

      - name: Tear down docker-compose
        if: always()
        run: |
          docker compose down -v
